<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<base href="/src/board-ui/">
<title>将棋RPG - 対局UI</title>
<style>
  body { font-family: sans-serif; background: #222; color: #eee; }
  #status { font-size: 18px; margin: 12px; }
  #board-container { max-width: 560px; margin: 0 auto; }
  #resign-button, #declare-win-button, #restart-button { margin: 0 12px 12px; }
  #connection-status {
    margin: 12px; padding: 8px 12px; background: #6b3f00; border-radius: 4px;
  }
  #result-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75);
    flex-direction: column; align-items: center; justify-content: center;
  }
  #result-overlay:not([hidden]) { display: flex; }
  #result-message { font-size: 24px; margin-bottom: 16px; }
  #result-actions { display: flex; gap: 12px; }

  #loading-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
    flex-direction: column; align-items: center; justify-content: center; z-index: 20;
  }
  #loading-overlay:not([hidden]) { display: flex; }
  #loading-spinner {
    width: 48px; height: 48px; margin-bottom: 16px;
    border: 5px solid #555; border-top-color: #4da3ff; border-radius: 50%;
    animation: loading-spin 0.8s linear infinite;
  }
  @keyframes loading-spin { to { transform: rotate(360deg); } }
  #loading-message { font-size: 16px; }
  #loading-retry { margin-top: 16px; padding: 8px 20px; }
</style>
</head>
<body>
  <h1>将棋RPG 対局UI</h1>
  <div id="status">読み込み中...</div>
  <div id="connection-status" role="status" hidden>
    オフラインです。対局は続けられますが、再読み込みは通信の回復後に行ってください。
  </div>
  <button id="resign-button" disabled>投了</button>
  <button id="declare-win-button" disabled>入玉宣言</button>
  <button id="restart-button">最初から</button>
  <div id="board-container"></div>
  <div id="result-overlay" hidden>
    <p id="result-message"></p>
    <div id="result-actions">
      <button id="result-retry">同じ条件でもう一度</button>
      <button id="result-close">閉じる</button>
    </div>
  </div>
  <div id="loading-overlay">
    <div id="loading-spinner"></div>
    <p id="loading-message">読み込み中...</p>
    <button id="loading-retry" hidden>再試行</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
