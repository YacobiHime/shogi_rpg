<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<base href="/src/board-ui/">
<title>将棋RPG - 対局UI</title>
<link rel="icon" href="data:,">
<style>
  :root {
    color-scheme: dark;
    --ink: #f8ecd6;
    --muted: #c8b89f;
    --panel: rgba(35, 25, 19, 0.9);
    --panel-edge: #77502f;
    --gold: #d7a64a;
    --gold-light: #f0cc7a;
  }
  * { box-sizing: border-box; }
  body {
    min-height: 100vh; margin: 0; color: var(--ink);
    font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    background:
      radial-gradient(circle at 50% -15%, rgba(171, 113, 51, 0.34), transparent 42rem),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 8px),
      #17120f;
  }
  h1 {
    margin: 0; padding: 18px 12px 10px; text-align: center;
    color: var(--gold-light); font: 700 clamp(22px, 4vw, 30px) "Yu Mincho", serif;
    letter-spacing: 0.12em; text-shadow: 0 2px 8px #000;
  }
  #status {
    max-width: 720px; min-height: 1.6em; margin: 0 auto 12px; padding: 0 16px;
    color: var(--muted); font-size: 16px; text-align: center;
  }
  #board-container {
    width: min(100%, 600px); margin: 0; padding: 0 8px 18px;
    filter: drop-shadow(0 16px 24px rgba(0,0,0,0.35));
  }
  #match-layout {
    display: grid; grid-template-columns: minmax(0, 600px) 190px;
    align-items: end; justify-content: center; gap: 8px;
    width: min(100%, 820px); margin: 0 auto;
  }
  #yakobihime-guide {
    display: flex; flex-direction: column; align-items: center; align-self: end;
    min-width: 0; padding: 0 6px 20px;
  }
  #yakobihime-speech {
    position: relative; width: 100%; margin: 0 0 8px; padding: 12px 10px;
    border: 3px solid #8f5f2f; border-radius: 16px; color: #392315;
    background: #fff8df; font-weight: 800; line-height: 1.45; text-align: center;
    filter: drop-shadow(0 5px 7px rgba(0,0,0,0.32));
  }
  #yakobihime-speech::after {
    content: ""; position: absolute; left: 50%; bottom: -12px;
    width: 18px; height: 18px; border-right: 3px solid #8f5f2f;
    border-bottom: 3px solid #8f5f2f; background: #fff8df;
    transform: translateX(-50%) rotate(45deg);
  }
  #yakobihime-image {
    display: block; width: min(100%, 170px); height: auto;
    filter: drop-shadow(0 8px 8px rgba(0,0,0,0.4));
  }
  #yakobihime-guide.speaking { animation: yakobihime-pop 0.36s ease-out; }
  @keyframes yakobihime-pop {
    0% { transform: scale(0.92); }
    65% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .shogi-board { display: block; overflow: visible; }
  .board-coordinate {
    fill: #ead7b9; font: 700 14px "Yu Mincho", serif; text-anchor: middle;
  }
  .hand-piece-count {
    fill: #fff4dc; font: 700 12px "Yu Gothic", sans-serif;
    paint-order: stroke; stroke: #24140b; stroke-width: 3px;
  }
  .hand-label { fill: #ead7b9; font-weight: 700; }
  #game-actions {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 9px;
    max-width: 720px; margin: 0 auto 10px; padding: 0 12px;
  }
  button {
    border: 1px solid #8b6844; border-radius: 6px; color: #fff7e8;
    background: linear-gradient(#5a412e, #35271f); font: inherit; cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.35);
  }
  button:hover:not(:disabled) { border-color: var(--gold); filter: brightness(1.12); }
  button:focus-visible { outline: 3px solid #60a5fa; outline-offset: 2px; }
  button:disabled { cursor: not-allowed; opacity: 0.45; }
  #game-actions button { min-height: 40px; margin: 0; padding: 8px 13px; }
  #hint-message { min-height: 1.5em; margin: 0 12px 12px; color: #facc15; font-weight: bold; }
  #connection-status {
    max-width: 720px; margin: 12px auto; padding: 8px 12px;
    background: #6b3f00; border-radius: 4px;
  }
  #result-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75);
    flex-direction: column; align-items: center; justify-content: center;
  }
  #result-overlay:not([hidden]) { display: flex; }
  #result-message { font-size: 24px; margin-bottom: 16px; }
  #result-actions { display: flex; gap: 12px; }

  #loading-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
    flex-direction: column; align-items: center; justify-content: center; z-index: 20;
  }
  #loading-overlay:not([hidden]) { display: flex; }
  #loading-spinner {
    width: 48px; height: 48px; margin-bottom: 16px;
    border: 5px solid #555; border-top-color: #4da3ff; border-radius: 50%;
    animation: loading-spin 0.8s linear infinite;
  }
  @keyframes loading-spin { to { transform: rotate(360deg); } }
  #loading-message { font-size: 16px; }
  #loading-retry { margin-top: 16px; padding: 8px 20px; }
  #setup-screen {
    max-width: 520px; margin: 24px auto; padding: 24px;
    background: var(--panel); border: 2px solid var(--panel-edge); border-radius: 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  }
  #setup-screen h2 { margin-top: 0; text-align: center; }
  #setup-form { display: grid; gap: 18px; }
  .setup-field { display: grid; gap: 7px; }
  .setup-field label { font-weight: bold; }
  .setup-field select {
    width: 100%; padding: 11px; border: 2px solid #888; border-radius: 6px;
    background: #181818; color: #fff; font-size: 17px;
  }
  #setup-start {
    padding: 13px 20px; border: 0; border-radius: 7px;
    background: linear-gradient(#b47a2a, #754514); color: #fff; font-size: 18px; font-weight: bold;
    cursor: pointer;
  }
  #setup-start:hover { background: linear-gradient(#c98b35, #87501a); }
  #setup-note { margin: 0; color: #ccc; font-size: 14px; }
  #save-panel {
    margin-top: 22px; padding-top: 18px; border-top: 1px solid #666;
  }
  #save-panel h3 { margin: 0 0 10px; }
  #save-panel textarea {
    box-sizing: border-box; width: 100%; min-height: 48px; padding: 9px;
    border: 2px solid #888; border-radius: 6px; background: #181818; color: #fff;
    font: 16px monospace; resize: vertical;
  }
  #save-panel button { padding: 8px 12px; margin: 7px 0 12px; }
  #save-status, #save-code-message { min-height: 1.4em; color: #ccc; }
  #save-code-message { color: #facc15; }
  @media (max-width: 780px) {
    #match-layout { display: block; }
    #board-container { margin: 0 auto; }
    #yakobihime-guide {
      flex-direction: row-reverse; justify-content: center; gap: 12px;
      width: min(100%, 560px); margin: -12px auto 8px; padding: 0 12px;
    }
    #yakobihime-image { width: 112px; }
    #yakobihime-speech { max-width: 290px; margin: 0; }
    #yakobihime-speech::after {
      left: auto; right: -12px; bottom: 50%; transform: translateY(50%) rotate(-45deg);
    }
  }
  @media (max-width: 520px) {
    h1 { padding-top: 12px; }
    #status { font-size: 14px; }
    #game-actions { gap: 7px; }
    #game-actions button { flex: 1 1 calc(50% - 7px); min-width: 132px; }
    #setup-screen { margin: 12px; padding: 18px; }
    #board-container { padding-inline: 2px; }
    #yakobihime-image { width: 92px; }
    #yakobihime-speech { max-width: 220px; padding: 9px; font-size: 14px; }
  }
</style>
</head>
<body>
  <h1>将棋RPG 対局UI</h1>
  <div id="status">読み込み中...</div>
  <div id="connection-status" role="status" hidden>
    オフラインです。対局は続けられますが、再読み込みは通信の回復後に行ってください。
  </div>
  <section id="setup-screen" hidden aria-labelledby="setup-heading">
    <h2 id="setup-heading">対局の準備</h2>
    <form id="setup-form">
      <div class="setup-field">
        <label for="setup-enemy">対戦相手</label>
        <select id="setup-enemy" name="enemy"></select>
      </div>
      <div class="setup-field">
        <label for="setup-formation">戦形</label>
        <select id="setup-formation" name="formation"></select>
      </div>
      <div class="setup-field">
        <label for="setup-difficulty">難易度</label>
        <select id="setup-difficulty" name="difficulty"></select>
      </div>
      <div class="setup-field">
        <label for="setup-item">スキル</label>
        <select id="setup-item" name="item"></select>
      </div>
      <p id="setup-note">あなたが先手で対局します。</p>
      <button id="setup-start" type="submit">対局開始</button>
    </form>
    <section id="save-panel" aria-labelledby="save-heading">
      <h3 id="save-heading">セーブ・復活の呪文</h3>
      <p id="save-status" role="status"></p>
      <label for="save-code-output">発行した復活の呪文</label>
      <textarea id="save-code-output" readonly></textarea>
      <button id="save-code-issue" type="button">復活の呪文を発行</button>
      <label for="save-code-input">復元する復活の呪文</label>
      <textarea id="save-code-input" autocomplete="off" spellcheck="false"></textarea>
      <button id="save-code-restore" type="button">復活の呪文から復元</button>
      <p id="save-code-message" role="status" aria-live="polite"></p>
    </section>
  </section>
  <main id="game-screen">
    <div id="game-actions">
      <button id="hint-button" disabled>ヒント（残り0）</button>
      <button id="undo-button" disabled>待った（残り0）</button>
      <button id="resign-button" disabled>投了</button>
      <button id="declare-win-button" disabled>入玉宣言</button>
      <button id="restart-button">対局条件を選び直す</button>
    </div>
    <p id="hint-message" role="status" aria-live="polite"></p>
    <div id="match-layout">
      <div id="board-container"></div>
      <aside id="yakobihime-guide" aria-label="やこび姫の戦形ガイド">
        <p id="yakobihime-speech" role="status" aria-live="polite">戦形が見えたら知らせるね！</p>
        <img id="yakobihime-image" src="/assets/characters/yakobihime-chibi.png" alt="戦形を知らせるミニキャラのやこび姫">
      </aside>
    </div>
  </main>
  <div id="result-overlay" hidden>
    <p id="result-message"></p>
    <div id="result-actions">
      <button id="result-retry">同じ条件でもう一度</button>
      <button id="result-close">閉じる</button>
    </div>
  </div>
  <div id="loading-overlay">
    <div id="loading-spinner"></div>
    <p id="loading-message">読み込み中...</p>
    <button id="loading-retry" hidden>再試行</button>
  </div>

  <script type="module" src="./main.js?v=adventure-courses-2"></script>
</body>
</html>
