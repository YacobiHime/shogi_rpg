<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>M0 検証: メインスレッド直接実行テスト</title>
  <style>
    body { font-family: monospace; background:#1e1e1e; color:#d4d4d4; padding:20px; }
    #output { background:#252526; padding:15px; white-space:pre-wrap; }
    .err { color:#f48771; }
    .ok { color:#6a9955; }
  </style>
</head>
<body>
  <h1>メインスレッド直接実行テスト（Worker経由なし）</h1>
  <p>目的: worker.js の入れ子Worker構成が原因かどうかを切り分ける。<br>
  ここでは Web Worker を一切使わず、このページ自身（メインスレッド）から直接 YaneuraOu() を呼び出す。</p>
  <div id="output">読み込み中...</div>

  <!-- yaneuraou.js をメインスレッドで直接読み込む -->
  <script src="yaneuraou.js"></script>
  <script>
    const output = document.getElementById('output');
    function log(msg, cls) {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = msg;
      output.appendChild(line);
      console.log(msg);
    }
    output.textContent = '';

    log('crossOriginIsolated: ' + self.crossOriginIsolated);
    log('YaneuraOu() を呼び出します...');

    const t0 = performance.now();
    YaneuraOu().then(function(instance) {
      const t1 = performance.now();
      log('初期化成功！ (' + (t1 - t0).toFixed(2) + 'ms)', 'ok');
      instance.addMessageListener(function(line) {
        log('< ' + line);
      });
      log('usi コマンドを送信します...');
      instance.postMessage('usi');
    }).catch(function(e) {
      log('初期化失敗: ' + e.message, 'err');
      console.error(e);
    });

    window.addEventListener('error', function(e) {
      log('window error: ' + e.message + ' (' + e.filename + ':' + e.lineno + ':' + e.colno + ')', 'err');
    });
  </script>
</body>
</html>
